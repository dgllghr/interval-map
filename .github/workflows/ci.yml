name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build and test

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
        ocaml-compiler:
          - "4.08"
          - "4.14"
          - "5.1"
          - "5.2"
          - "5.3"
        exclude:
          # macos-latest is arm64 and has no prebuilt OCaml < 5.0
          - os: macos-latest
            ocaml-compiler: "4.08"
          - os: macos-latest
            ocaml-compiler: "4.14"
          # setup-ocaml on Windows does not support OCaml 4.08
          - os: windows-latest
            ocaml-compiler: "4.08"
        include:
          # Cover the excluded older OCaml versions on Intel macOS
          - os: macos-13
            ocaml-compiler: "4.08"
          - os: macos-13
            ocaml-compiler: "4.14"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Install dependencies
        run: opam install . --deps-only --with-doc --with-test

      - name: Build
        run: opam exec -- dune build

      - name: Run tests
        run: opam exec -- dune runtest

  format:
    name: Check formatting

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use OCaml 5.3
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3"

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      - name: Install ocamlformat
        run: opam install ocamlformat

      - name: Check formatting
        run: opam exec -- dune build @fmt
